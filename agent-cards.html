        color: var(--text-muted);
      }

      .site-header__nav {
        display: flex;
        gap: 1rem;
        align-items: center;
      }

      .site-header__link {
        padding: 0.35rem 0.8rem;
        text-decoration: none;
        color: var(--text-muted);
        font-size: 0.86rem;
        border-radius: 999px;
      }

      .site-header__link--active {
        background: linear-gradient(135deg, #e5e7eb, #cdd3e7);
        color: #020617;
      }

      .site-header__link:hover {
        color: var(--accent-strong);
        background: rgba(15, 23, 42, 0.85);
      }

      .subhero {

        gap: 2rem;
        align-items: flex-end;

        margin: 0 0 0.6rem;
      }

      .subhero__subtitle {
        margin: 0;
        color: var(--text-muted);
        max-width: 34rem;
        font-size: 0.98rem;
      }

      .subhero__meta {
        font-size: 0.85rem;
        color: var(--text-soft);
        text-align: right;
      }

        background: rgba(15, 23, 42, 0.9);
        padding: 0.2rem 0.4rem;
        border-radius: 4px;
        font-size: 0.8rem;
      }
