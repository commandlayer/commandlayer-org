      "ship","shipment","deliver","delivery","track","schedule","dispatch","route","move","load","store","record","file","scan",
      "checkin","lookup","locate","reserve","pickup","submit","review","list","query","logoff"
    ]),
    ai: new Set([
      "analyze","summarize","classify","parse","format","clean","convert","describe","explain","fetch","generate","optimize","forecast",
      "predict","evaluate","assess","compute","learn","plan","train","filter","compress","extract","visualize","rewrite","compose",
      "decode","reason","critique","diagram","refactor","simplify","expand","iterate","model","reference","rank","sort","group","detect"
    ])
  };

  function inferCategory(verb) {
    const v = (verb || "").toLowerCase();
    for (const [cat, set] of Object.entries(CATEGORY_HINTS)) {
      if (set.has(v)) return cat;
    }
    // Governance + security-ish defaults
    if (["govern","propose","vote","enforce","regulate","attest","verify","validate","authenticate","kyc","guard","safety","protect","audit"].includes(v)) {
      return "other";
    }
    return "operations";
  }

  function inferType(category, verb) {
    // money-moving / marketplace semantics default to commercial
    if (category === "finance" || category === "commerce") return "commercial";
    if (["insure","underwrite","cover","license","lease","rent"].includes((verb || "").toLowerCase())) return "commercial";
    return "commons";
  }

  function inferTier(type, status) {
    if (status === "live" && type === "commercial") return "premium";
    if (type === "commercial") return "unpriced";
    return status === "live" ? "free" : "unpriced";
  }

  function defaultDescription(_verb, category) {
    const c =
      category === "ai" ? "AI & intelligence" :
      category === "commerce" ? "Commerce & payments" :
      category === "finance" ? "Finance & risk" :
      category === "comms" ? "Comms & outreach" :
      category === "operations" ? "Operations & logistics" :
      "Other / system";
    return `Reserved ${c} verb for standardized agent intent.`;
  }

  // 4) Merge: add ONLY missing ENS (de-duped), categorized via heuristics.
  (function mergeMasterIntoVerbs() {
    const existing = new Set(verbs.map(v => String(v.ens || "").toLowerCase()));
    const toAdd = [];

    for (const ens of MASTER_VERB_AGENT_ENS) {
      const key = String(ens || "").toLowerCase();
      if (!key) continue;
      if (existing.has(key)) continue;
      if (!key.endsWith("agent.eth")) continue; // hard guard

      const verb = key.replace(/agent\.eth$/i, "");
      const category = inferCategory(verb);
      const type = inferType(category, verb);
      const status = "reserved";
      const tier = inferTier(type, status);

      toAdd.push({
        verb,
        ens: key,
        category,
        type,
        status,
        tier,
        description: defaultDescription(verb, category)
      });

      existing.add(key);
    }

    // stable merge (keeps your curated ordering; new entries append)
    verbs.push(...toAdd);
  })();

  // --- rest of your existing code below stays the same ---
  const searchInput = document.getElementById("verb-search");
  const categorySelect = document.getElementById("verb-category");
  const typeSelect = document.getElementById("verb-type");
  const statusSelect = document.getElementById("verb-status");
  const verbGrid = document.getElementById("verb-grid");
  const verbCount = document.getElementById("verb-count");

  function labelCategory(cat) {
    switch (cat) {
      case "ai": return "AI & intelligence";
      case "commerce": return "Commerce & payments";
      case "operations": return "Operations & logistics";
      case "finance": return "Finance & risk";
      case "comms": return "Comms & outreach";
      default: return "Other / system";
    }
  }

  function labelStatus(status) {
    switch (status) {
      case "live": return "Live";
      case "inflight": return "In flight";
      default: return "Reserved";
    }
  }

  function labelTier(tier) {
    switch (tier) {
      case "premium": return "Premium";
      case "free": return "Free / Commons";
      default: return "Unpriced";
    }
  }

  function renderVerbs() {
    const search = (searchInput.value || "").trim().toLowerCase();
    const category = categorySelect.value;
    const type = typeSelect.value;
    const status = statusSelect.value;

    let filtered = verbs.filter((v) => {
      if (category !== "all" && v.category !== category) return false;
      if (type !== "all" && v.type !== type) return false;
      if (status !== "all" && v.status !== status) return false;

      if (search) {
        const haystack =
          (v.verb || "") + " " +
          (v.ens || "") + " " +
          (v.description || "") + " " +
          (v.category || "") + " " +
          (v.type || "") + " " +
          (v.status || "");
        if (!haystack.toLowerCase().includes(search)) return false;
      }
      return true;
    });

    // Deliberate sort order (reads like a product, not a dictionary)
    const categoryOrder = { ai: 1, commerce: 2, finance: 3, operations: 4, comms: 5, other: 6 };

    filtered.sort((a, b) => {
      const ca = categoryOrder[a.category] ?? 99;
      const cb = categoryOrder[b.category] ?? 99;
      if (ca !== cb) return ca - cb;

      // Commons first, then Commercial
      const ta = a.type === "commons" ? 1 : 2;
      const tb = b.type === "commons" ? 1 : 2;
      if (ta !== tb) return ta - tb;

      return String(a.verb || "").localeCompare(String(b.verb || ""));
    });

    verbGrid.innerHTML = "";

    if (filtered.length === 0) {
      verbGrid.innerHTML = `
        <article class="verb-card">
          <div class="verb-card__header">
            <div>
              <div class="verb-card__verb">No matches</div>
              <div class="verb-card__ens">Try clearing filters or widening your search.</div>
            </div>
            <div class="verb-card__type-badge">Manifest</div>
          </div>
          <div class="verb-card__description">
            Nothing in the current slice matches those filters.
          </div>
        </article>
      `;
      verbCount.textContent = "Showing 0 verbs";
      return;
    }

    filtered.forEach((v) => {
      const card = document.createElement("article");
      card.className = "verb-card";

      const statusClass =
        v.status === "live"
          ? "tag tag--status-live"
          : v.status === "inflight"
          ? "tag tag--status-inflight"
          : "tag tag--status-reserved";

      let tierClass;
      if (v.tier === "premium") tierClass = "tag tag--tier-premium";
      else if (v.tier === "free") tierClass = "tag tag--tier-free";
      else tierClass = "tag tag--tier-unpriced";

      const typeLabel = v.type === "commercial" ? "Commercial" : v.type === "commons" ? "Commons" : "Other";

      let linksHtml = "";
      if (v.status === "live") {
        if (v.docsUrl) {
          linksHtml += `<a href="${v.docsUrl}" class="verb-card__link" target="_blank" rel="noopener noreferrer">Docs</a>`;
        }
        if (v.cardUrl) {
          linksHtml += `<a href="${v.cardUrl}" class="verb-card__link" target="_blank" rel="noopener noreferrer">Agent Cards</a>`;
        }
      }

      card.innerHTML = `
        <div class="verb-card__header">
          <div>
            <div class="verb-card__verb">${v.verb}</div>
            <div class="verb-card__ens">${v.ens}</div>
          </div>
          <div class="verb-card__type-badge">${typeLabel}</div>
        </div>
        <div class="verb-card__meta-row">
          <span class="tag">${labelCategory(v.category)}</span>
          <span class="${statusClass}">${labelStatus(v.status)}</span>
          <span class="${tierClass}">${labelTier(v.tier)}</span>
        </div>
        <div class="verb-card__description">${v.description || ""}</div>
        <div class="verb-card__links">${linksHtml}</div>
      `;

      verbGrid.appendChild(card);
    });

    verbCount.textContent = `Showing ${filtered.length} verb${filtered.length === 1 ? "" : "s"}`;
  }

  searchInput.addEventListener("input", renderVerbs);
  categorySelect.addEventListener("change", renderVerbs);
  typeSelect.addEventListener("change", renderVerbs);
  statusSelect.addEventListener("change", renderVerbs);

  renderVerbs();
</script>
