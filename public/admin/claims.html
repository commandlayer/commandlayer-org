<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CommandLayer Claims Admin</title>
  <link rel="stylesheet" href="/css/site.css" />
  <style>
    body { background: #fafafa; color: #111827; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .card { background: white; border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; border-bottom: 1px solid #e5e7eb; padding: 8px; }
    tr:hover { background: #f9fafb; cursor: pointer; }
    pre { white-space: pre-wrap; overflow-wrap: anywhere; background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    input, textarea { padding: 8px; min-width: 300px; }
    textarea { min-height: 80px; }
    button { padding: 8px 12px; }
    .muted { color: #6b7280; }
    .status-badge { display: inline-block; padding: 4px 10px; border-radius: 999px; background: #e5e7eb; font-weight: 700; }
    .error-panel { margin: 10px 0; padding: 10px; border-radius: 8px; border: 1px solid #fecaca; background: #fef2f2; color: #991b1b; }
  </style>
</head>
<body>
  <div class="container">
    <h1>CommandLayer Claims Admin</h1>
    <div class="card"><div class="row"><label for="apiKey">Admin API key</label><input id="apiKey" type="password" placeholder="Enter ADMIN_API_KEY" /><button id="saveKey">Save key</button><button id="loadClaims">Load claims</button><span id="status" class="muted"></span></div></div>
    <div class="card"><h2>Claims</h2><table><thead><tr><th>Claim ID</th><th>Tenant</th><th>Wallet</th><th>Pack</th><th>Status</th><th>Agents</th><th>Created</th></tr></thead><tbody id="claimsBody"></tbody></table></div>
    <div class="card"><h2>Claim detail</h2><div id="detail" class="muted">Select a claim row to view details.</div></div>
  </div>
<script>
(() => {
  const apiKeyInput = document.getElementById('apiKey');
  const saveKeyBtn = document.getElementById('saveKey');
  const loadClaimsBtn = document.getElementById('loadClaims');
  const statusEl = document.getElementById('status');
  const claimsBody = document.getElementById('claimsBody');
  const detail = document.getElementById('detail');
  let selectedClaimId = '';
  let claimActionError = null;
  apiKeyInput.value = sessionStorage.getItem('cl_admin_api_key') || localStorage.getItem('cl_admin_api_key') || '';
  function authHeaders() { return { Authorization: `Bearer ${apiKeyInput.value.trim()}`, 'Content-Type': 'application/json' }; }
  saveKeyBtn.addEventListener('click', () => { const v = apiKeyInput.value.trim(); sessionStorage.setItem('cl_admin_api_key', v); localStorage.setItem('cl_admin_api_key', v); statusEl.textContent = 'Saved.'; });
  async function loadClaims() { /* unchanged */
    statusEl.textContent = 'Loading claims...'; claimsBody.innerHTML = '';
    const res = await fetch('/api/admin/claims', { headers: { Authorization: authHeaders().Authorization } }); const data = await res.json();
    if (!res.ok || !data.ok) { statusEl.textContent = `${res.status} ${data.status || 'error'}`; return; }
    for (const claim of data.claims) { const tr = document.createElement('tr'); tr.innerHTML = `<td>${claim.claimId}</td><td>${claim.tenant}</td><td>${claim.authenticatedAddress}</td><td>${claim.packId}</td><td>${claim.status}</td><td>${claim.agentCount}</td><td>${claim.createdAt}</td>`; tr.addEventListener('click', () => loadDetail(claim.claimId)); claimsBody.appendChild(tr); }
    statusEl.textContent = `Loaded ${data.claims.length} claims.`;
  }
  async function claimAction(action, payload = {}) {
    const res = await fetch('/api/admin/claim-action', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ claimId: selectedClaimId, action, actor: 'admin', ...payload }) });
    const data = await res.json();
    if (!res.ok || !data.ok) {
      claimActionError = {
        status: data.status || 'REQUEST_FAILED',
        error: data.error || 'Request failed.',
        debug: data.debug || null,
        fromStatus: data.fromStatus,
        action: data.action || action
      };
      await loadDetail(selectedClaimId);
      return;
    }
    claimActionError = null;
    await loadDetail(selectedClaimId);
    await loadClaims();
  }

  async function publishAgentCards(claimId) {
    const res = await fetch('/api/admin/publish-agent-cards', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ claimId, actor: 'admin' })
    });
    const data = await res.json();
    if (!res.ok || !data.ok) {
      claimActionError = {
        status: data.status || 'REQUEST_FAILED',
        error: data.error || 'Request failed.',
        debug: data.debug || null,
        action: 'publish-agent-cards'
      };
      await loadDetail(claimId);
      return;
    }
    claimActionError = null;
    await loadDetail(claimId);
    await loadClaims();
  }

  async function loadDetail(claimId) {
    selectedClaimId = claimId;
    const res = await fetch(`/api/admin/claim?claimId=${encodeURIComponent(claimId)}`, { headers: { Authorization: authHeaders().Authorization } });
    const data = await res.json();
    if (!res.ok || !data.ok) { detail.textContent = `${res.status} ${data.status || 'error'}`; return; }
    const status = data.claim.status;
    detail.innerHTML = `<p><strong>claim ID:</strong> ${data.claim.claim_id}</p><p><strong>Status:</strong> <span class="status-badge">${status}</span></p>
      <div id="actionErrorPanel"></div>
      <div class="row" id="actionRow"></div><p id="nextStep" class="muted"></p>
      <div><label>Reason</label><input id="reasonInput" placeholder="Reason for reject/failure" /></div>
      <div><label>Notes</label><textarea id="notesInput" placeholder="Admin notes"></textarea></div>
      <div class="row"><button id="saveNoteBtn">Save note</button><button id="refreshBtn">Refresh timeline</button></div>
      <h3>Transitions</h3><pre>${JSON.stringify(data.transitions || [], null, 2)}</pre>
      <h3>Events</h3><pre>${JSON.stringify(data.events || [], null, 2)}</pre>
      <h3>Agents</h3><pre>${JSON.stringify(data.agents || [], null, 2)}</pre>`;
    const actionRow = document.getElementById('actionRow');
    const errorPanel = document.getElementById('actionErrorPanel');
    if (claimActionError) {
      errorPanel.className = 'error-panel';
      const detailText = claimActionError.debug && claimActionError.debug.message ? `\nDetails: ${claimActionError.debug.message}` : '';
      errorPanel.textContent = `Action failed:\n${claimActionError.status} — ${claimActionError.error}${detailText}`;
    } else {
      errorPanel.textContent = '';
      errorPanel.className = '';
    }
    const mk = (label, cb) => { const b = document.createElement('button'); b.textContent = label; b.addEventListener('click', cb); actionRow.appendChild(b); };
    if (status === 'created') { mk('Approve', () => claimAction('approve', { notes: document.getElementById('notesInput').value })); mk('Reject', () => claimAction('reject', { reason: document.getElementById('reasonInput').value })); mk('Mark failed', () => claimAction('mark_failed', { reason: document.getElementById('reasonInput').value })); }
    if (status === 'approved') { document.getElementById('nextStep').textContent = 'Next: Publish agent cards.'; mk('Publish agent cards', () => publishAgentCards(selectedClaimId)); mk('Mark failed', () => claimAction('mark_failed', { reason: document.getElementById('reasonInput').value })); }
    if (status === 'rejected') { mk('Reopen / Approve (override)', () => claimAction('approve', { override: true, reason: document.getElementById('reasonInput').value, notes: document.getElementById('notesInput').value })); mk('Mark failed', () => claimAction('mark_failed', { reason: document.getElementById('reasonInput').value })); }
    if (status === 'failed') { document.getElementById('nextStep').textContent = 'Failed status: auto-retry is not enabled yet.'; }
    document.getElementById('saveNoteBtn').addEventListener('click', () => claimAction('add_note', { notes: document.getElementById('notesInput').value, reason: document.getElementById('reasonInput').value }));
    document.getElementById('refreshBtn').addEventListener('click', () => loadDetail(claimId));
  }
  loadClaimsBtn.addEventListener('click', loadClaims);
})();
</script>
</body></html>
