<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Receipt Verification URL — CommandLayer</title>
  <style>
    body{font-family:Inter,system-ui,sans-serif;background:#0b0f14;color:#e6edf3;margin:0}
    main{max-width:900px;margin:32px auto;padding:0 16px}
    .card{background:#111827;border:1px solid #334155;border-radius:12px;padding:16px;margin-bottom:16px}
    .pill{display:inline-block;padding:4px 10px;border-radius:999px;font-weight:700}
    .ok{background:#064e3b;color:#bbf7d0}.bad{background:#7f1d1d;color:#fecaca}.muted{color:#9ca3af}
    .checks li{margin:6px 0}.row{display:flex;gap:8px;flex-wrap:wrap}
    button,a.btn{background:#2563eb;color:#fff;border:none;border-radius:8px;padding:8px 12px;text-decoration:none;display:inline-block;cursor:pointer}
    pre{white-space:pre-wrap;word-break:break-word;background:#020617;padding:12px;border-radius:8px;border:1px solid #334155}
  </style>
</head>
<body>
  <main>
    <h1>Verify receipt URL</h1>
    <p class="muted">Verification checks are computed from the receipt, signer records, hash, and signature.</p>
    <p class="muted">Schema-valid does not always mean cryptographically valid.</p>

    <div class="card" id="statusCard"><div id="statusText">loading</div></div>

    <div class="card" id="resultCard" hidden>
      <div><strong>receipt_id:</strong> <code id="receiptIdDisplay">-</code></div>
      <div id="verdict" style="margin-top:10px"></div>
      <ul class="checks" id="checks"></ul>
      <div class="row">
        <button id="copyUrlBtn">Copy verification URL</button>
        <button id="toggleRawBtn">View raw receipt</button>
        <a class="btn" href="/verify.html">Back to /verify.html</a>
      </div>
      <pre id="rawReceipt" hidden></pre>
    </div>
  </main>
  <script type="module" src="/js/verify-url.js"></script>
</body>
</html>
